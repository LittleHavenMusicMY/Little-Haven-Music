<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LHM | Studio Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        h1, h2, h3 { font-family: 'Quicksand', sans-serif; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-pink-500 rounded-lg flex items-center justify-center text-white font-bold">L</div>
                <h1 class="text-xl font-bold tracking-tight">Studio Dashboard</h1>
            </div>
            <div id="auth-status" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Connecting...</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-12">
        
        <div class="grid lg:grid-cols-3 gap-8">
            
            <!-- SECTION: INQUIRIES -->
            <div class="lg:col-span-2 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-bold">Student Inquiries</h2>
                    <span id="inquiry-count" class="bg-slate-200 px-3 py-1 rounded-full text-xs font-bold">0 New</span>
                </div>
                
                <div id="inquiries-list" class="space-y-4">
                    <div class="p-8 bg-white rounded-3xl border border-slate-100 shadow-sm animate-pulse">Loading inquiries...</div>
                </div>
            </div>

            <!-- SECTION: TESTIMONIAL MODERATION -->
            <div class="space-y-6">
                <h2 class="text-2xl font-bold">Pending Reviews</h2>
                <div id="pending-testimonials" class="space-y-4">
                    <!-- Injected -->
                    <div class="p-6 bg-slate-50 rounded-3xl border border-dashed border-slate-200 text-center text-slate-400 text-sm">
                        No new reviews to moderate.
                    </div>
                </div>

                <div class="p-6 bg-indigo-600 rounded-[2rem] text-white shadow-xl shadow-indigo-200">
                    <h3 class="font-bold mb-2">Quick Tip ✨</h3>
                    <p class="text-sm text-indigo-100 leading-relaxed">Approving a review here will make it instantly visible on your live website's "Kind Words" section.</p>
                </div>
            </div>

        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'little-haven';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-status').innerText = `Admin: ${user.uid.substring(0,8)}`;
                loadData();
            } else {
                if (typeof __initial_auth_token !== 'undefined') await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            }
        });

        function loadData() {
            // Watch Inquiries
            const inqRef = collection(db, 'artifacts', appId, 'public', 'data', 'inquiries');
            onSnapshot(inqRef, (snap) => {
                const list = document.getElementById('inquiries-list');
                document.getElementById('inquiry-count').innerText = `${snap.size} Total`;
                
                if (snap.empty) {
                    list.innerHTML = `<div class="p-12 bg-white rounded-[3rem] text-center border border-slate-100 text-slate-400 italic">No inquiries yet. Good luck with the marketing!</div>`;
                    return;
                }

                list.innerHTML = snap.docs.map(doc => {
                    const data = doc.data();
                    const date = data.at?.toDate().toLocaleDateString() || 'Recently';
                    return `
                        <div class="p-6 md:p-8 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col md:flex-row justify-between gap-6">
                            <div class="space-y-2">
                                <div class="flex items-center gap-3">
                                    <h3 class="font-bold text-lg">${data.name}</h3>
                                    <span class="px-3 py-1 bg-pink-50 text-pink-500 text-[10px] font-bold uppercase rounded-full">${data.type}</span>
                                </div>
                                <p class="text-slate-500 text-sm">${data.message || 'No message provided.'}</p>
                                <div class="flex gap-4 text-xs font-bold text-slate-400 uppercase tracking-wider pt-2">
                                    <span>📞 ${data.phone}</span>
                                    <span>📍 ${data.area}</span>
                                    <span>📅 ${date}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <a href="https://wa.me/${data.phone.replace(/\D/g,'')}" target="_blank" class="px-4 py-2 bg-emerald-500 text-white rounded-xl text-xs font-bold hover:bg-emerald-600 transition">WhatsApp</a>
                                <button onclick="deleteInquiry('${doc.id}')" class="p-2 text-slate-300 hover:text-red-500 transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            });

            // Watch Pending Testimonials
            const testRef = collection(db, 'artifacts', appId, 'public', 'data', 'testimonials');
            onSnapshot(testRef, (snap) => {
                const container = document.getElementById('pending-testimonials');
                const pending = snap.docs.filter(d => d.data().status === 'pending');

                if (pending.length === 0) {
                    container.innerHTML = `<div class="p-6 bg-slate-50 rounded-3xl border border-dashed border-slate-200 text-center text-slate-400 text-xs uppercase font-bold">All clear!</div>`;
                    return;
                }

                container.innerHTML = pending.map(doc => {
                    const data = doc.data();
                    return `
                        <div class="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm space-y-4">
                            <p class="text-sm italic text-slate-600">"${data.quote}"</p>
                            <div class="flex items-center justify-between">
                                <span class="text-xs font-bold text-slate-800">— ${data.author}</span>
                                <div class="flex gap-2">
                                    <button onclick="approveTestimonial('${doc.id}')" class="px-3 py-1 bg-emerald-100 text-emerald-600 rounded-lg text-[10px] font-bold hover:bg-emerald-200 transition">Approve</button>
                                    <button onclick="deleteInquiry('${doc.id}', 'testimonials')" class="px-3 py-1 bg-rose-50 text-rose-400 rounded-lg text-[10px] font-bold hover:bg-rose-100 transition">Delete</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        window.approveTestimonial = async (id) => {
            try {
                // To actually display them on the home page, the home page's logic 
                // would need to be updated to fetch from the collection instead of the hardcoded siteData.
                // For now, this updates the status in the DB.
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'testimonials', id);
                await updateDoc(docRef, { status: 'approved' });
                
                // Note: To see these on the index.html, you'd need a "Sync Testimonials" button 
                // that adds approved ones to the siteData content doc.
                alert("Review Approved! (Note: Manual sync to Home Page content may be required if not using live-feed collection)");
            } catch (e) { alert("Error approving."); }
        };

        window.deleteInquiry = async (id, type = 'inquiries') => {
            if (!confirm("Are you sure you want to remove this?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', type, id));
            } catch (e) { alert("Error deleting."); }
        };

    </script>
</body>
</html>
