<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LHM | Studio Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        h1, h2, h3 { font-family: 'Quicksand', sans-serif; }
        .sync-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-pink-500 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-pink-100">L</div>
                <h1 class="text-xl font-bold tracking-tight">Studio Dashboard</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="sync-indicator" class="hidden flex items-center gap-2 text-[10px] font-bold text-emerald-500 uppercase tracking-widest">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full sync-pulse"></span> Live Sync Active
                </div>
                <div id="auth-status" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Connecting...</div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-12">
        
        <!-- Connection Status Banner -->
        <div id="status-banner" class="mb-8 p-4 rounded-2xl bg-amber-50 border border-amber-200 text-amber-700 text-sm hidden flex items-center gap-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <span id="status-message">Connecting to database...</span>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            
            <!-- SECTION: INQUIRIES -->
            <div class="lg:col-span-2 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-bold">Student Inquiries</h2>
                    <span id="inquiry-count" class="bg-slate-200 px-3 py-1 rounded-full text-xs font-bold">0 Total</span>
                </div>
                
                <div id="inquiries-list" class="grid gap-4">
                    <div class="p-8 bg-white rounded-3xl border border-slate-100 shadow-sm animate-pulse text-slate-400 text-center">Fetching inquiries...</div>
                </div>
            </div>

            <!-- SECTION: TESTIMONIAL MODERATION -->
            <div class="space-y-6">
                <h2 class="text-2xl font-bold">Pending Reviews</h2>
                <div id="pending-testimonials" class="space-y-4">
                    <div class="p-6 bg-slate-50 rounded-3xl border border-dashed border-slate-200 text-center text-slate-400 text-sm">
                        Loading reviews...
                    </div>
                </div>

                <div class="p-8 bg-gradient-to-br from-indigo-600 to-purple-700 rounded-[2.5rem] text-white shadow-xl shadow-indigo-100">
                    <h3 class="font-bold text-lg mb-2 italic">Management Tip ✨</h3>
                    <p class="text-sm text-indigo-100 leading-relaxed mb-4">Approving a review here tags it as "Public" in your database.</p>
                    <div class="text-[10px] uppercase font-bold tracking-widest bg-white/10 p-3 rounded-xl border border-white/10">
                        Total Approved: <span id="approved-count">0</span>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'little-haven';
        const banner = document.getElementById('status-banner');
        const statusMsg = document.getElementById('status-message');

        async function initFirebase() {
            try {
                if (typeof __firebase_config === 'undefined') {
                    throw new Error("Missing database configuration. Please check your hosting settings.");
                }

                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        document.getElementById('auth-status').innerText = `ID: ${user.uid.substring(0,8)}`;
                        document.getElementById('sync-indicator').classList.remove('hidden');
                        banner.classList.add('hidden');
                        loadData();
                    } else {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    }
                });
            } catch (error) {
                banner.classList.remove('hidden');
                statusMsg.innerText = error.message;
                document.getElementById('inquiries-list').innerHTML = `<div class="p-12 bg-white rounded-3xl border border-rose-100 text-rose-500 text-center font-bold">Offline: ${error.message}</div>`;
            }
        }

        function loadData() {
            // Watch Inquiries
            const inqRef = collection(db, 'artifacts', appId, 'public', 'data', 'inquiries');
            onSnapshot(inqRef, (snap) => {
                const list = document.getElementById('inquiries-list');
                document.getElementById('inquiry-count').innerText = `${snap.size} Total`;
                
                if (snap.empty) {
                    list.innerHTML = `<div class="p-12 bg-white rounded-[3rem] text-center border border-slate-100 text-slate-400 italic">No inquiries yet. New student leads will appear here.</div>`;
                    return;
                }

                list.innerHTML = snap.docs.sort((a,b) => (b.data().at?.seconds || 0) - (a.data().at?.seconds || 0)).map(doc => {
                    const data = doc.data();
                    const date = data.at?.toDate().toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) || 'Just now';
                    return `
                        <div class="p-6 md:p-8 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-md transition-shadow flex flex-col md:flex-row justify-between gap-6">
                            <div class="space-y-3">
                                <div class="flex flex-wrap items-center gap-3">
                                    <h3 class="font-bold text-xl text-slate-800">${data.name}</h3>
                                    <span class="px-3 py-1 bg-indigo-50 text-indigo-500 text-[10px] font-bold uppercase rounded-full tracking-wider border border-indigo-100">${data.type}</span>
                                </div>
                                <p class="text-slate-600 text-sm leading-relaxed">${data.message || '<span class="italic text-slate-400 text-xs">No message provided.</span>'}</p>
                                <div class="flex flex-wrap gap-y-2 gap-x-5 text-[11px] font-bold text-slate-400 uppercase tracking-wider pt-2">
                                    <span class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-width="2"/></svg> ${data.phone}</span>
                                    <span class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-width="2"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/></svg> ${data.area}</span>
                                    <span class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg> ${date}</span>
                                </div>
                            </div>
                            <div class="flex md:flex-col items-center justify-center gap-3 border-t md:border-t-0 md:border-l border-slate-100 pt-4 md:pt-0 md:pl-8">
                                <a href="https://wa.me/${data.phone.replace(/\D/g,'')}" target="_blank" class="w-full md:w-32 py-3 bg-emerald-500 text-white rounded-2xl text-xs font-bold hover:bg-emerald-600 transition shadow-lg shadow-emerald-100 text-center">Chat ✨</a>
                                <button onclick="deleteDocItem('${doc.id}', 'inquiries')" class="w-full md:w-32 py-3 bg-slate-50 text-slate-400 rounded-2xl text-xs font-bold hover:bg-rose-50 hover:text-rose-500 transition border border-slate-100">Remove</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }, (err) => {
                banner.classList.remove('hidden');
                statusMsg.innerText = "Error syncing data: " + err.message;
            });

            // Watch Testimonials
            const testRef = collection(db, 'artifacts', appId, 'public', 'data', 'testimonials');
            onSnapshot(testRef, (snap) => {
                const container = document.getElementById('pending-testimonials');
                const pending = snap.docs.filter(d => d.data().status === 'pending');
                const approvedCount = snap.docs.filter(d => d.data().status === 'approved').length;

                document.getElementById('approved-count').innerText = approvedCount;

                if (pending.length === 0) {
                    container.innerHTML = `
                        <div class="p-10 bg-white rounded-3xl border border-slate-100 text-center">
                            <div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">✅</div>
                            <p class="text-xs uppercase font-bold tracking-widest text-slate-400">Inbox Zero</p>
                            <p class="text-[10px] text-slate-300 mt-1">No pending reviews</p>
                        </div>`;
                    return;
                }

                container.innerHTML = pending.map(doc => {
                    const data = doc.data();
                    return `
                        <div class="p-6 bg-white rounded-[2rem] border border-slate-100 shadow-sm space-y-4 hover:border-pink-200 transition-colors">
                            <p class="text-sm italic text-slate-600 leading-relaxed">"${data.quote}"</p>
                            <div class="flex items-center justify-between pt-2">
                                <span class="text-xs font-bold text-slate-800 uppercase tracking-tighter">— ${data.author}</span>
                                <div class="flex gap-2">
                                    <button onclick="approveTestimonial('${doc.id}')" class="px-4 py-2 bg-pink-500 text-white rounded-xl text-[10px] font-bold hover:bg-pink-600 transition shadow-md shadow-pink-100">Approve</button>
                                    <button onclick="deleteDocItem('${doc.id}', 'testimonials')" class="p-2 text-slate-300 hover:text-rose-500 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        window.approveTestimonial = async (id) => {
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'testimonials', id);
                await updateDoc(docRef, { status: 'approved' });
            } catch (e) { alert("Error approving: " + e.message); }
        };

        window.deleteDocItem = async (id, collectionName) => {
            if (!confirm("Are you sure you want to delete this permanently?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, id));
            } catch (e) { alert("Error deleting: " + e.message); }
        };

        initFirebase();
    </script>
</body>
</html>
